services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atendimento
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Opcional — só para quem optar por SQS em vez de BullMQ/Redis.
  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: sqs
    ports:
      - "4566:4566"

  # Simula a Meta WhatsApp Cloud API: dispara webhooks assinados e recebe seus envios.
  mock-meta:
    build: ./mock-meta-server
    ports:
      - "8001:8001"
    environment:
      # Mesmos valores do seu .env — usados para ASSINAR o webhook (HMAC-SHA256).
      META_APP_SECRET: super-secret-app-secret-trocar
      # Para onde o mock entrega os webhooks.
      CANDIDATE_WEBHOOK_URL: ${CANDIDATE_WEBHOOK_URL:-http://backend:8000/webhook}
    depends_on:
      - backend

  backend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm run db:migrate && npm run dev"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-proj-troque-pela-sua-chave}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_TOOL_CALLING_ENABLED: ${LLM_TOOL_CALLING_ENABLED:-true}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-meu-verify-token-secreto}
      META_APP_SECRET: ${META_APP_SECRET:-super-secret-app-secret-trocar}
      META_TOKEN: ${META_TOKEN:-mock-token}
      META_API_BASE_URL: http://mock-meta:8001
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-123456789012345}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/atendimento
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: ${QUEUE_NAME:-inbound-messages}
      PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-4000-8000-000000000001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: node:24-alpine
    working_dir: /app
    command: npm run worker
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-proj-troque-pela-sua-chave}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_TOOL_CALLING_ENABLED: ${LLM_TOOL_CALLING_ENABLED:-true}
      META_TOKEN: ${META_TOKEN:-mock-token}
      META_API_BASE_URL: http://mock-meta:8001
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-123456789012345}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/atendimento
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: ${QUEUE_NAME:-inbound-messages}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-4000-8000-000000000001}
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
